services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mabrur
      POSTGRES_PASSWORD: mabrur_secret
      POSTGRES_DB: mabrur
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mabrur"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: ./server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://mabrur:mabrur_secret@postgres:5432/mabrur
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
