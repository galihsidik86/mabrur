databases:
  - name: mabrur-db
    plan: free
    databaseName: mabrur
    user: mabrur

services:
  - type: web
    name: mabrur-api
    plan: free
    runtime: node
    buildCommand: cd server && npm install && npx tsc
    startCommand: cd server && npx tsx src/db/migrate.ts && npx tsx src/db/seed.ts && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mabrur-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        # Jangan commit kunci asli. Set manual di dashboard (64 hex / 32 byte).
        # Bukan kunci produksi — deploy produksi via SSH memakai .env server sendiri.
        sync: false
    healthCheckPath: /health
