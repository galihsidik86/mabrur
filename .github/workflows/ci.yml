name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mabrur
          POSTGRES_PASSWORD: mabrur_secret
          POSTGRES_DB: mabrur
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mabrur"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgres://mabrur:mabrur_secret@localhost:5432/mabrur
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-characters
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: server

      - name: Run migrations
        run: npm run db:migrate

      - name: Run seeds
        run: npm run db:seed

      - name: Unit tests
        run: npm run test

      - name: Start server
        run: npm run server:dev &
        env:
          PORT: 3000

      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost:3000/health && break || sleep 1
          done

      - name: Integration tests
        run: npx vitest run tests/integration.test.ts
        working-directory: server

  build-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: apps/admin
      - run: npm run build
        working-directory: apps/admin
